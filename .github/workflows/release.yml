name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # release-please publishes the GitHub release with GITHUB_TOKEN, and GitHub
  # will not let a GITHUB_TOKEN-created release event trigger another workflow,
  # so the publish must be called from here (this run is the merge push) to tag
  # released images with their version. version is empty on non-release pushes.
  publish-images:
    needs: release-please
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.version || '' }}
